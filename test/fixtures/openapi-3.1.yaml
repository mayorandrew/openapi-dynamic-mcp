openapi: 3.1.0
info:
  title: Test 3.1 API
  version: 1.0.0
  summary: An API using OpenAPI 3.1 features
servers:
  - url: https://api31.example.com
webhooks:
  newPet:
    post:
      operationId: newPetWebhook
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        '200':
          description: ok
paths:
  /items:
    get:
      operationId: listItems
      summary: List items
      parameters:
        - name: filter
          in: query
          schema:
            type:
              - string
              - 'null'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type:
                        - string
                        - 'null'
  /items/{itemId}:
    get:
      operationId: getItem
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: ok
